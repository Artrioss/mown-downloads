name: Mirror Website (grab-site)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to mirror'
        required: true
        default: 'https://appwrite.io/docs'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install grab-site
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git
          pip3 install --user grab-site

      - name: Mirror website with grab-site
        run: |
          mkdir -p mirror
          ~/.local/bin/grab-site "${{ github.event.inputs.url }}" \
            --warc-dir=mirror \
            --level=2 \
            --concurrency=8 \
            --wait=1

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mirror/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Mirror updated: ${{ github.event.inputs.url }}" && git push)
