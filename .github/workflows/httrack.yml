name: Mirror with HTTrack
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to mirror'
        required: true
        default: 'https://appwrite.io/docs'

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Install HTTrack
        run: sudo apt-get update && sudo apt-get install -y httrack zip

      - name: Restore mirror cache (including hts-cache)
        uses: actions/cache@v4
        id: cache
        with:
          path: mirror
          key: httrack-mirror-${{ runner.os }}-${{ github.event.inputs.url }}

      - name: Create mirror directory
        run: mkdir -p mirror

      - name: Mirror website with HTTrack
        run: |
          httrack "${{ github.event.inputs.url }}" \
            -O mirror \
            -N100 \
            -I0 \
            --near \
            --depth=2 \
            --sockets=8 \
            --retries=3 \
            --timeout=15 \
            -F "Mozilla/5.0 (compatible; MirrorBot/2.0)" \
            -v

      - name: Clean temporary HTTrack files
        run: |
          find mirror -name "*.gif" -delete 2>/dev/null || true
          rm -f mirror/hts-cache/* mirror/backblue.gif mirror/fade.gif mirror/index.html 2>/dev/null || true

      - name: Compress site
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          zip -r "site_mirror_${TIMESTAMP}.zip" mirror/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: httrack-mirror-${{ github.run_id }}
          path: site_mirror_*.zip
          retention-days: 7
