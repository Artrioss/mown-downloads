name: Mirror Website (HTTrack)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to mirror'
        required: true
        default: 'https://appwrite.io/docs'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install HTTrack
        run: sudo apt-get update && sudo apt-get install -y httrack

      - name: Mirror website with HTTrack
        run: |
          mkdir -p mirror
          httrack "${{ github.event.inputs.url }}" \
            -O mirror \
            -N100 \
            -I0 \
            --near \
            --depth=2 \
            --max-rate=200000 \
            --disable-security-limits \
            --sockets=8 \
            --retries=3 \
            --timeout=20 \
            -F "Mozilla/5.0 (compatible; MirrorBot/1.0)" \
            -v

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mirror/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Mirror updated: ${{ github.event.inputs.url }}" && git push)
