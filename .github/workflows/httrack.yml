name: Mirror with HTTrack

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL to mirror (e.g., https://appwrite.io/docs)'
        required: true
        default: 'https://appwrite.io/docs'

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Install HTTrack
        run: sudo apt-get update && sudo apt-get install -y httrack zip

      - name: Restore mirror cache
        uses: actions/cache@v4
        id: cache
        with:
          path: mirror
          key: httrack-enhanced-mirror-${{ runner.os }}-${{ github.event.inputs.url }}

      - name: Create mirror directory
        run: mkdir -p mirror

      - name: Mirror website with HTTrack (Enhanced)
        run: |
          httrack "${{ github.event.inputs.url }}" \
            -O mirror \
            -N100 \
            -I0 \
            --near \
            --depth=3 \
            --ext-depth=3 \
            --sockets=8 \
            --retries=5 \
            --timeout=30 \
            --keep-alive \
            --extended-parsing=3 \
            --mime-html \
            --cached-delayed-type-check \
            --disable-security-limits \
            -F "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            +*.css +*.js +*.woff* +*.ttf +*.svg +*.png +*.jpg +*.jpeg +*.gif +*.webp +*.ico \
            -*.mp4 -*.avi -*.mkv -*.mov -*.zip -*.tar.gz -*.rar \
            -v

      - name: Clean temporary HTTrack files
        run: |
          find mirror -name "*.gif" -delete 2>/dev/null || true
          rm -f mirror/hts-cache/* mirror/backblue.gif mirror/fade.gif mirror/index.html 2>/dev/null || true

      - name: Compress site
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          zip -r "appwrite_docs_${TIMESTAMP}.zip" mirror/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appwrite-docs-enhanced-${{ github.run_id }}
          path: appwrite_docs_*.zip
          retention-days: 7
